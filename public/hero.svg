<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-label="IT'S STATIC — Urban Resistance Hero">
  <defs>
    <pattern id="hero-dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#9f376f" opacity="0.25"/>
    </pattern>
    <pattern id="halftone" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="6" r="3" fill="#1b1b1e" opacity="0.12"/>
    </pattern>
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0e8ff"/>
      <stop offset="100%" stop-color="#7ed4fd"/>
    </linearGradient>
    <linearGradient id="pink-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff85c1"/>
      <stop offset="100%" stop-color="#ffd8e7"/>
    </linearGradient>
    <linearGradient id="yellow-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe24c"/>
      <stop offset="100%" stop-color="#c7ad07"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="url(#sky-grad)"/>
  <rect width="800" height="800" fill="url(#hero-dots)"/>

  <!-- ── Big sticker block top-left ── -->
  <rect x="30" y="30" width="340" height="90" rx="12" fill="#ffe24c" stroke="#1b1b1e" stroke-width="5" transform="rotate(-2 30 30)"/>
  <text x="50" y="92" font-family="'Bricolage Grotesque', Arial Black, sans-serif" font-weight="900" font-size="54" fill="#1b1b1e" letter-spacing="-3" transform="rotate(-2 50 92)">URBAN</text>

  <!-- ── Pink sticker word ── -->
  <rect x="370" y="24" width="390" height="90" rx="12" fill="#ff85c1" stroke="#1b1b1e" stroke-width="5" transform="rotate(1.5 370 24)"/>
  <text x="388" y="88" font-family="'Bricolage Grotesque', Arial Black, sans-serif" font-weight="900" font-size="54" fill="#1b1b1e" letter-spacing="-3" transform="rotate(1.5 388 88)">RESISTANCE</text>

  <!-- ── City skyline silhouette ── -->
  <!-- Buildings (dark, bottom portion) -->
  <g fill="#1b1b1e">
    <!-- Far left tall building -->
    <rect x="0" y="540" width="60" height="260"/>
    <!-- Windows left building -->
    <rect x="10" y="556" width="12" height="16" fill="#ffe24c" opacity="0.7"/>
    <rect x="34" y="556" width="12" height="16" fill="#ffe24c" opacity="0.4"/>
    <rect x="10" y="586" width="12" height="16" fill="#7ed4fd" opacity="0.6"/>
    <rect x="34" y="586" width="12" height="16" fill="#ffe24c" opacity="0.8"/>
    <rect x="10" y="616" width="12" height="16" fill="#ff85c1" opacity="0.7"/>

    <!-- Short building -->
    <rect x="60" y="610" width="80" height="190"/>
    <rect x="72" y="624" width="14" height="18" fill="#7ed4fd" opacity="0.5"/>
    <rect x="100" y="624" width="14" height="18" fill="#ffe24c" opacity="0.6"/>
    <rect x="72" y="656" width="14" height="18" fill="#ff85c1" opacity="0.5"/>

    <!-- Mid building -->
    <rect x="140" y="490" width="100" height="310"/>
    <rect x="154" y="506" width="16" height="20" fill="#ffe24c" opacity="0.6"/>
    <rect x="182" y="506" width="16" height="20" fill="#7ed4fd" opacity="0.5"/>
    <rect x="210" y="506" width="16" height="20" fill="#ff85c1" opacity="0.7"/>
    <rect x="154" y="540" width="16" height="20" fill="#7ed4fd" opacity="0.4"/>
    <rect x="182" y="540" width="16" height="20" fill="#ffe24c" opacity="0.8"/>
    <rect x="154" y="574" width="16" height="20" fill="#ff85c1" opacity="0.6"/>
    <rect x="182" y="574" width="16" height="20" fill="#ffe24c" opacity="0.5"/>
    <!-- Water tower -->
    <rect x="176" y="462" width="28" height="8"/>
    <polygon points="176,462 204,462 196,440 184,440" fill="#1b1b1e"/>
    <rect x="186" y="440" width="8" height="10"/>

    <!-- Right area buildings -->
    <rect x="560" y="520" width="90" height="280"/>
    <rect x="574" y="538" width="16" height="20" fill="#ffe24c" opacity="0.6"/>
    <rect x="606" y="538" width="16" height="20" fill="#7ed4fd" opacity="0.7"/>
    <rect x="574" y="572" width="16" height="20" fill="#ff85c1" opacity="0.5"/>
    <rect x="606" y="572" width="16" height="20" fill="#ffe24c" opacity="0.4"/>

    <rect x="650" y="580" width="70" height="220"/>
    <rect x="662" y="596" width="12" height="16" fill="#7ed4fd" opacity="0.6"/>
    <rect x="686" y="596" width="12" height="16" fill="#ffe24c" opacity="0.7"/>

    <rect x="720" y="540" width="80" height="260"/>
    <rect x="732" y="556" width="14" height="18" fill="#ff85c1" opacity="0.6"/>
    <rect x="756" y="556" width="14" height="18" fill="#ffe24c" opacity="0.5"/>
    <rect x="732" y="590" width="14" height="18" fill="#7ed4fd" opacity="0.7"/>
  </g>

  <!-- ── Ground / street ── -->
  <rect x="0" y="760" width="800" height="40" fill="#1b1b1e"/>
  <!-- Street dashes -->
  <rect x="60" y="772" width="60" height="6" rx="3" fill="#ffe24c"/>
  <rect x="200" y="772" width="60" height="6" rx="3" fill="#ffe24c"/>
  <rect x="340" y="772" width="60" height="6" rx="3" fill="#ffe24c"/>
  <rect x="480" y="772" width="60" height="6" rx="3" fill="#ffe24c"/>
  <rect x="620" y="772" width="60" height="6" rx="3" fill="#ffe24c"/>

  <!-- ── Central big figure (silhouette) ── -->
  <!-- Body -->
  <ellipse cx="400" cy="380" rx="80" ry="120" fill="#1b1b1e"/>
  <!-- Head -->
  <circle cx="400" cy="230" r="60" fill="#1b1b1e"/>
  <!-- Arms -->
  <ellipse cx="300" cy="370" rx="28" ry="80" fill="#1b1b1e" transform="rotate(-15 300 370)"/>
  <ellipse cx="500" cy="360" rx="28" ry="80" fill="#1b1b1e" transform="rotate(20 500 360)"/>
  <!-- Legs -->
  <ellipse cx="368" cy="540" rx="30" ry="90" fill="#1b1b1e" transform="rotate(8 368 540)"/>
  <ellipse cx="432" cy="540" rx="30" ry="90" fill="#1b1b1e" transform="rotate(-8 432 540)"/>

  <!-- Figure face detail — static eyes (white) -->
  <circle cx="382" cy="222" r="10" fill="#fbf8fc"/>
  <circle cx="418" cy="222" r="10" fill="#fbf8fc"/>
  <!-- Pixel eyes -->
  <rect x="378" y="218" width="8" height="8" fill="#9f376f"/>
  <rect x="414" y="218" width="8" height="8" fill="#9f376f"/>

  <!-- Figure hoodie front pocket -->
  <rect x="368" y="400" width="64" height="36" rx="8" fill="#1b1b1e" stroke="#fbf8fc" stroke-width="2"/>

  <!-- Raised fist (left hand) -->
  <rect x="264" y="286" width="40" height="46" rx="10" fill="#1b1b1e" stroke="#ff85c1" stroke-width="3"/>
  <rect x="264" y="278" width="40" height="14" rx="4" fill="#1b1b1e" stroke="#ff85c1" stroke-width="2"/>

  <!-- ── Lightning bolt accent ── -->
  <polygon points="460,140 440,200 462,200 438,268 480,192 456,192 480,140" fill="#ffe24c" stroke="#1b1b1e" stroke-width="4"/>

  <!-- ── Left side figure (smaller) ── -->
  <circle cx="180" cy="470" r="34" fill="#9f376f"/>
  <ellipse cx="180" cy="560" rx="44" ry="70" fill="#9f376f"/>
  <ellipse cx="140" cy="540" rx="16" ry="46" fill="#9f376f" transform="rotate(-10 140 540)"/>
  <ellipse cx="218" cy="545" rx="16" ry="44" fill="#9f376f" transform="rotate(10 218 545)"/>
  <ellipse cx="162" cy="668" rx="18" ry="52" fill="#9f376f"/>
  <ellipse cx="198" cy="668" rx="18" ry="52" fill="#9f376f"/>
  <!-- Left figure face -->
  <circle cx="170" cy="464" r="7" fill="#fbf8fc"/>
  <circle cx="190" cy="464" r="7" fill="#fbf8fc"/>
  <rect x="168" y="462" width="5" height="5" fill="#1b1b1e"/>
  <rect x="188" y="462" width="5" height="5" fill="#1b1b1e"/>

  <!-- ── Right side figure (smaller) ── -->
  <circle cx="620" cy="470" r="34" fill="#006686"/>
  <ellipse cx="620" cy="560" rx="44" ry="70" fill="#006686"/>
  <ellipse cx="580" cy="545" rx="16" ry="44" fill="#006686" transform="rotate(-10 580 545)"/>
  <ellipse cx="658" cy="540" rx="16" ry="46" fill="#006686" transform="rotate(10 658 540)"/>
  <ellipse cx="602" cy="668" rx="18" ry="52" fill="#006686"/>
  <ellipse cx="638" cy="668" rx="18" ry="52" fill="#006686"/>
  <!-- Right figure face -->
  <circle cx="610" cy="464" r="7" fill="#fbf8fc"/>
  <circle cx="630" cy="464" r="7" fill="#fbf8fc"/>
  <rect x="608" y="462" width="5" height="5" fill="#1b1b1e"/>
  <rect x="628" y="462" width="5" height="5" fill="#1b1b1e"/>

  <!-- ── IT'S STATIC text banner ── -->
  <rect x="230" y="128" width="340" height="74" rx="10" fill="#ff85c1" stroke="#1b1b1e" stroke-width="5" transform="rotate(-1 230 128)"/>
  <text x="252" y="184" font-family="'Bricolage Grotesque', Arial Black, sans-serif" font-weight="900" font-size="52" fill="#1b1b1e" letter-spacing="-3" transform="rotate(-1 252 184)">IT'S STATIC</text>

  <!-- ── Small decorative stickers ── -->
  <!-- Top-right star burst -->
  <polygon points="730,80 742,110 774,110 750,130 758,162 730,144 702,162 710,130 686,110 718,110" fill="#ffe24c" stroke="#1b1b1e" stroke-width="3"/>
  <text x="718" y="128" font-family="'Bricolage Grotesque', Arial Black, sans-serif" font-weight="900" font-size="14" fill="#1b1b1e" text-anchor="middle">LIVE</text>

  <!-- Bottom-right badge -->
  <rect x="566" y="660" width="168" height="46" rx="23" fill="#ffe24c" stroke="#1b1b1e" stroke-width="4" transform="rotate(-3 566 660)"/>
  <text x="652" y="690" font-family="'Bricolage Grotesque', Arial Black, sans-serif" font-weight="900" font-size="20" fill="#1b1b1e" text-anchor="middle" transform="rotate(-3 652 690)">NO BOTS ALLOWED</text>

  <!-- Halftone overlay for texture -->
  <rect width="800" height="800" fill="url(#halftone)" opacity="0.4"/>
</svg>
